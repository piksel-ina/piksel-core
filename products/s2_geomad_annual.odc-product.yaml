    dtype: uint16
    nodata: 0

  - name: "red"
    aliases: [band_04, B04]
    units: "1"
    dtype: uint16
    nodata: 0

  - name: "green"
    aliases: [band_03, B03]
    units: "1"
    dtype: uint16
    nodata: 0

  - name: "nir"
    aliases: [band_08, B08]
    units: "1"
    dtype: uint16
    nodata: 0

  - name: "nir08"
    aliases: [band_8a, B8A]
    units: "1"
    dtype: uint16
    nodata: 0

  - name: "rededge1"
    aliases: [band_05, B05]
    units: "1"
    dtype: uint16
    nodata: 0

  - name: "rededge2"
    aliases: [band_06, B06]
    units: "1"
